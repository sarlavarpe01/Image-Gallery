<!DOCTYPE html>
<html>
<head>
    <title>Beautiful Cat Gallery</title>
    <style>
        .main-img {
            height: 400px; /* bigger main image */
            width: auto;
            border-radius: 10px;
            transition: opacity 0.5s ease-in-out;
        }
        .gallary-container {
            width: fit-content;
            margin: 20px auto;
            display: flex;
            align-items: center;
        }
        .btn-slide {
            display: flex;
            height: 40px;
            width: 40px;
            border-radius: 50px;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 1px solid black;
        }
        .preview-img {
            height: 80px;
            width: 100px;
            object-fit: cover;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .preview-img.active {
            border: 2px solid #ff6600;
        }
        .gallary-preview {
            display: flex;
            overflow-x: auto;
            width: 70%;
            margin: 20px auto;
        }
        .desc {
            text-align: center;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="gallary-container">
        <span class="btn-slide btn-left" onclick="slideLeft()">&lt;</span>
        <img class="main-img" id="mainImage" alt="Cat image" />
        <span class="btn-slide btn-right" onclick="slideRight()">&gt;</span>
    </div>

    <p id="description" class="desc"></p>

    <div class="gallary-preview" id="gallary-preview"></div>

    <script>
        const IMAGES = [
            { url: "https://images.pexels.com/photos/20787/pexels-photo.jpg", desc: "Fluffy white cat" },
            { url: "https://images.pexels.com/photos/617278/pexels-photo-617278.jpeg", desc: "Curious kitten" },
            { url: "https://images.pexels.com/photos/127028/pexels-photo-127028.jpeg", desc: "Playful cat eyes" },
            { url: "https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg", desc: "Soft grey kitten" },
            { url: "https://images.pexels.com/photos/1170986/pexels-photo-1170986.jpeg", desc: "Beautiful orange cat" },
            { url: "https://images.pexels.com/photos/326875/pexels-photo-326875.jpeg", desc: "Sleeping cat peacefully" } // new image
        ];

        let currentIndex = 0;

        function showCurrentIndexImage() {
            const img = document.getElementById("mainImage");
            const desc = document.getElementById("description");
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = IMAGES[currentIndex].url + "?auto=compress&cs=tinysrgb&w=1200";
                desc.innerText = IMAGES[currentIndex].desc;
                img.style.opacity = 1;
                highlightThumbnail();
            }, 200);
        }

        function slideLeft() {
            currentIndex = currentIndex > 0 ? currentIndex - 1 : IMAGES.length - 1;
            showCurrentIndexImage();
        }

        function slideRight() {
            currentIndex = currentIndex < IMAGES.length - 1 ? currentIndex + 1 : 0;
            showCurrentIndexImage();
        }

        function showImage(i) {
            currentIndex = i;
            showCurrentIndexImage();
        }

        function createGallaryPreview() {
            const container = document.getElementById("gallary-preview");
            container.innerHTML = "";
            IMAGES.forEach((item, i) => {
                container.innerHTML += `
                <img src="${item.url}?auto=compress&cs=tinysrgb&w=300"
                alt="${item.desc}"
                class="preview-img"
                onclick="showImage(${i})" />`;
            });
        }

        function highlightThumbnail() {
            document.querySelectorAll(".preview-img").forEach((img, i) => {
                img.classList.toggle("active", i === currentIndex);
            });
        }

        createGallaryPreview();
        showCurrentIndexImage();
    </script>
</body>
</html>
